# Multi-tenant przm platform stack — cortex + przm-access + Caddy (TLS).
#
# Runs on any Linux box with Docker + Compose. Designed for a single small VM
# (e.g. DO Droplet, Hetzner CPX21) talking to a managed Postgres (Neon
# recommended) over the public Internet. See README.md for the operator flow.
#
# Bring up:
#   docker compose -f docker-compose.platform.yml --env-file .env up -d
# Update images:
#   docker compose -f docker-compose.platform.yml pull && \
#     docker compose -f docker-compose.platform.yml up -d
#
# Everything is parameterized via `.env` (generated by ./bootstrap.sh). The
# stack does NOT run Postgres locally — operator provides ACCESS_DATABASE_URL
# and CORTEX_DATABASE_URL pointing at Neon (or any managed PG with RLS).

services:
  access-service:
    image: ghcr.io/onenomad-llc/przm-access-service:${ACCESS_IMAGE_TAG:-latest}
    container_name: przm-access-service
    restart: unless-stopped
    networks: [platform]
    environment:
      PRZM_ACCESS_PORT: "4400"
      DATABASE_URL: ${ACCESS_DATABASE_URL}
      PRZM_ACCESS_JWT_PRIVATE_JWK: ${ACCESS_PRIVATE_JWK}
      PRZM_ACCESS_JWT_PUBLIC_JWK: ${ACCESS_PUBLIC_JWK}
      PRZM_ACCESS_JWT_ISSUER: ${ACCESS_ISSUER}
      PRZM_ACCESS_JWT_AUDIENCE: ${ACCESS_AUDIENCE}
      PRZM_ACCESS_JWT_TTL_SECONDS: ${ACCESS_JWT_TTL_SECONDS:-3600}
      PRZM_ACCESS_ADMIN_API_KEY: ${ACCESS_ADMIN_API_KEY}
      # Optional: restricted role the service's RLS-scoped path lowers into.
      # The DATABASE_URL base role must be a member of it. See README.
      PRZM_ACCESS_DB_APP_ROLE: ${ACCESS_DB_APP_ROLE:-}
      # Optional: WorkOS SSO (leave empty until SSO is wired).
      WORKOS_API_KEY: ${WORKOS_API_KEY:-}
      WORKOS_CLIENT_ID: ${WORKOS_CLIENT_ID:-}
      WORKOS_REDIRECT_URI: ${WORKOS_REDIRECT_URI:-}
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4400/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 15s

  cortex:
    image: ghcr.io/onenomad-llc/przm-cortex:${CORTEX_IMAGE_TAG:-latest}
    container_name: przm-cortex
    restart: unless-stopped
    networks: [platform]
    depends_on:
      access-service:
        condition: service_healthy
    environment:
      # MCP transport — HTTP, bound to the platform network so only Caddy hits it.
      PRZM_CORTEX_MCP_TRANSPORT: http
      PRZM_CORTEX_MCP_HOST: 0.0.0.0
      PRZM_CORTEX_MCP_PORT: "3100"
      PRZM_CORTEX_MCP_AUTH_TOKEN: ${CORTEX_MCP_AUTH_TOKEN}
      # ADR-021 access: a valid przm-access scoped token both authenticates
      # the request AND yields the tenant the backend scopes RLS by.
      PRZM_CORTEX_ACCESS_PUBLIC_JWK: ${ACCESS_PUBLIC_JWK}
      PRZM_CORTEX_ACCESS_ISSUER: ${ACCESS_ISSUER}
      PRZM_CORTEX_ACCESS_AUDIENCE: ${ACCESS_AUDIENCE}
      PRZM_CORTEX_HOME: /data/.cortex
      # LLM provider (BYOK). Leave unset for local Xenova embeddings only.
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
    volumes:
      - cortex-data:/data
      # Cortex memory + RLS config. Generated by ./bootstrap.sh from
      # cortex.yaml.template — points at CORTEX_DATABASE_URL with enableRls.
      - ./cortex.yaml:/etc/cortex/cortex.yaml:ro
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3100/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 30s

  caddy:
    image: caddy:2-alpine
    container_name: przm-caddy
    restart: unless-stopped
    networks: [platform]
    ports:
      - "80:80"
      - "443:443"
    environment:
      CORTEX_DOMAIN: ${CORTEX_DOMAIN}
      ACCESS_DOMAIN: ${ACCESS_DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

networks:
  platform:
    driver: bridge

volumes:
  cortex-data:
  caddy-data:
  caddy-config:
