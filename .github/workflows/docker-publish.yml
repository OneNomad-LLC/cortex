# Build and publish the cortex container image to GitHub Container
# Registry (ghcr.io) on every push to main and on every git tag.
#
# Why this exists:
#   `cortex update` on the VPS pulls from a registry instead of rebuilding
#   from source — saves 2-5 min on a small droplet and means the operator
#   has nothing to install beyond `docker compose pull && cortex update`.
#
# What it produces:
#   ghcr.io/onenomad-llc/przm-cortex:latest      (latest main)
#   ghcr.io/onenomad-llc/przm-cortex:main-<sha>  (every main commit)
#   ghcr.io/onenomad-llc/przm-cortex:v<X.Y.Z>    (every git tag)
#
# Supply-chain features (Task #08):
#   - Keyless cosign signing (Sigstore OIDC, no key management)
#   - SLSA Level 3 provenance via slsa-github-generator
#
# Verify after publish:
#   cosign verify \
#     --certificate-identity-regexp '.*' \
#     --certificate-oidc-issuer-regexp '.*' \
#     ghcr.io/onenomad-llc/przm-cortex:<tag>
#
# Auth uses the workflow's built-in GITHUB_TOKEN with packages: write —
# no extra secrets to manage.

name: docker-publish

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Override image tag (defaults to 'manual-<sha>')"
        required: false

permissions:
  contents: read
  packages: write
  id-token: write   # required for cosign keyless signing + SLSA provenance

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: onenomad-llc/przm-cortex

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image-digest: ${{ steps.build.outputs.digest }}
      image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract tags + labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=main-,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=${{ github.event.inputs.tag }},enable=${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag != '' }}

      - name: Build + push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: packages/server/Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image with cosign (keyless / Sigstore OIDC)
        # Signs the image by digest — digest is immutable, tags are mutable.
        # Verify with:
        #   cosign verify \
        #     --certificate-identity-regexp '.*' \
        #     --certificate-oidc-issuer-regexp '.*' \
        #     ghcr.io/onenomad-llc/przm-cortex@<digest>
        run: |
          cosign sign --yes \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}

  # SLSA Level 3 provenance — runs after the image is pushed so it can
  # reference the immutable digest produced by build-and-push.
  slsa-provenance:
    needs: build-and-push
    permissions:
      actions: read        # to read the workflow run
      id-token: write      # to sign the provenance
      packages: write      # to upload the provenance to GHCR
    # Pin to v2.0.0 — the generator is itself SLSA-verified.
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_container_slsa3.yml@v2.0.0
    with:
      image: ghcr.io/onenomad-llc/przm-cortex
      digest: ${{ needs.build-and-push.outputs.image-digest }}
      registry-username: ${{ github.actor }}
    secrets:
      registry-password: ${{ secrets.GITHUB_TOKEN }}
