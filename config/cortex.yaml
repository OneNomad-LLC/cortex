# Written by `cortex init`. Re-run the wizard to regenerate.

llm:
  providers:
    ollama:
      package: "@onenomad/cortex-provider-ollama"
      enabled: true
      config:
        host: "${OLLAMA_HOST}"
        defaultModel: "qwen3:14b"

  tasks:
    default:    { provider: ollama, model: "qwen3:14b" }
    structural: { provider: ollama, model: "qwen3:14b" }
    synthesis:  { provider: ollama, model: "qwen3:14b" }
    brief:      { provider: ollama, model: "qwen3:14b" }
    classify:   { provider: ollama, model: "qwen3:14b" }
    embed:      { provider: ollama, model: "nomic-embed-text" }

  fallbackChain: []

memory:
  primary: engram
  # fallback: pgvector     # uncomment to enable the native Postgres fallback
  # pgvector:
  #   connectionString: "${POSTGRES_URL}"
  #   embeddingDim: 768    # must match the embed model's dimension

adapters: {}
